<body>

<h2>Formulário - Catálogo de livros</h2>
<form action ="/action_page.php"><!--indica para onde os dados serão enviados quando o usuário clicar em Submit-->

    <label for="imagem">URL da imagem:</label><br> <!--label=texto descritivo de cada campo, id e for Conecta o label ao campo visualmente-->
    <input type="url" id="imagem" name="imagem" placeholder="URL da imagem"><br><br>

    <label for="fname"> Nome do livro:</label><br>
    <input type="text" id ="fname" name="fname" placeholder = "Coloque o nome do livro"><br><br>

    <label for ="lname">Nome do autor:</label><br>
    <input type="text" id="lname" name="lname" placeholder="Coloque o nome do autor "><br><br>

    <input type="submit" value="Submit">
  </form>
